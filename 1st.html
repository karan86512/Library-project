
<!DOCTYPE html>
<html>
<head>
<title>Library Management System</title>

<style>

body{
margin:0;
font-family:Arial;
background-image:url("https://images.unsplash.com/photo-1524995997946-a1c2e315a42f");
background-size:cover;
background-position:center;
}

.login-container{
width:350px;
background:white;
padding:30px;
margin:120px auto;
text-align:center;
border-radius:10px;
box-shadow:0px 0px 15px gray;
}

.logo{
width:70px;
margin-bottom:10px;
}

h1{
font-size:22px;
}

.tagline{
color:gray;
font-size:14px;
}

input,select{
width:90%;
padding:10px;
margin:10px;
border-radius:5px;
border:1px solid gray;
}

button{
background:#3498db;
color:white;
border:none;
padding:10px;
width:95%;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#2c80b4;
}

.forgot{
display:block;
font-size:13px;
margin-top:-5px;
margin-bottom:10px;
color:#3498db;
text-decoration:none;
}

.register{
font-size:14px;
}

footer{
text-align:center;
color:white;
margin-top:40px;
}

</style>

</head>

<body>

<div class="login-container">

<img src="logo.png" class="logo">

<h1>Library Management System</h1>

<p class="tagline">Knowledge is the key to success</p>



<input type="text" placeholder="Enter Username">

<input type="password" placeholder="Enter Password">

<a href="forget.html" class="forgot">Forgot Password?</a>

<button onclick="login()">Login</button>

<p class="register">
New User? <a href="2nd.html">Register</a>
</p>

</div>

<footer>
<p>Developed by Karan More | 2026</p>
</footer>

<script>

function login(){


alert("Student Login Successful");

window.location.href = "3th.html";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Edit Profile</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background: linear-gradient(135deg,#2c3e50,#1abc9c);
}

/* CONTAINER */
.container{
width:400px;
background:white;
padding:30px;
margin:60px auto;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

/* PROFILE IMAGE */
.profile-img{
width:100px;
height:100px;
border-radius:50%;
border:4px solid #1abc9c;
margin-bottom:10px;
object-fit:cover;
}

/* INPUT */
input,select{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
}

/* BUTTON */
button{
width:100%;
padding:12px;
background:#1abc9c;
color:white;
border:none;
border-radius:6px;
font-size:15px;
cursor:pointer;
}

button:hover{
background:#16a085;
}

/* BACK LINK */
a{
display:block;
margin-top:15px;
text-decoration:none;
color:#2c3e50;
font-weight:bold;
}

a:hover{
color:#1abc9c;
}

</style>

</head>

<body>

<div class="container">

<h2>Edit Profile</h2>

<img src="profile photo.png" class="profile-img" id="preview">

<form onsubmit="saveProfile(event)">

<input type="file" onchange="previewImage(event)">

<input type="text" placeholder="Full Name" required>
<input type="email" placeholder="Email" required>
<input type="text" placeholder="Mobile Number">

<select>
<option>Course</option>
<option>BSc Computer Science</option>
<option>BCA</option>
<option>BCom</option>
</select>


<button type="submit">Save Changes</button>

</form>

<a href="3th.html">⬅ Back to Dashboard</a>

</div>

<script>

/* IMAGE PREVIEW */
function previewImage(event){
let reader = new FileReader();
reader.onload = function(){
document.getElementById("preview").src = reader.result;
}
reader.readAsDataURL(event.target.files[0]);
}

/* SAVE PROFILE */
function saveProfile(e){
e.preventDefault();
alert("Profile Updated Successfully");
window.location.href = "3th.html";
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>

<head>
<title>Issue Book</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, sans-serif;
}

body{
margin:0;
font-family:Arial;
background-image:url("https://images.unsplash.com/photo-1524995997946-a1c2e315a42f");
background-size:cover;
background-position:center;
}

/* HEADER */

.header{
background:linear-gradient(90deg,#2c3e50,#1abc9c);
color:white;
padding:18px;
text-align:center;
font-size:22px;
letter-spacing:1px;
}

/* FORM CONTAINER */

.container{
width:420px;
margin:60px auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

/* TITLE */

.container h3{
text-align:center;
margin-bottom:20px;
color:#2c3e50;
}

/* LABELS */

label{
font-weight:bold;
color:#333;
}

/* INPUT FIELDS */

input{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:16px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
transition:0.3s;
}

input:focus{
border-color:#f39c12;
outline:none;
box-shadow:0 0 5px rgba(243,156,18,0.4);
}

/* BUTTON */

button{
width:100%;
padding:12px;
background:linear-gradient(90deg,#f39c12,#f1c40f);
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
background:linear-gradient(90deg,#d68910,#f39c12);
}

/* BACK LINK */

a{
display:block;
text-align:center;
margin-top:15px;
text-decoration:none;
color:#2c3e50;
font-weight:bold;
transition:0.3s;
}

a:hover{
color:#1abc9c;
}

</style>

</head>

<body>

<div class="header">
📚 Library Management System
</div>

<div class="container">

<h3>Issue Book to Student</h3>

<form>

<label>Book ID</label>
<input type="number" placeholder="Enter Book ID" required>

<label>Student Name</label>
<input type="text" placeholder="Enter Student Name" required>

<label>Issue Date</label>
<input type="date" required>

<label>Return Date</label>
<input type="date" required>

<button type="submit">📖 Issue Book</button>

</form>

<a href="3th.html">⬅ Back to Dashboard</a>

</div>

</body>

</html>

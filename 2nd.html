<!DOCTYPE html>
<html>

<head>
<title>Library Register</title>

<style>

body{
margin:0;
font-family:Arial;
background-image:url("https://images.unsplash.com/photo-1524995997946-a1c2e315a42f");
background-size:cover;
background-position:center;
}

.container{
background:white;
padding:30px;
width:300px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
text-align:center;
}

input{
width:90%;
padding:10px;
margin:10px;
border:1px solid gray;
border-radius:5px;
}

button{
padding:10px;
width:95%;
background:#ff5e62;
color:white;
border:none;
border-radius:5px;
}

a{
text-decoration:none;
color:#ff5e62;
}

</style>

</head>

<body>

<div class="container">

<h2>📚 Library Register</h2>

<!-- ✅ FORM UPDATED -->
<form onsubmit="redirectLogin(event)">

<input type="text" placeholder="Full Name" required>
<input type="email" placeholder="Email" required>
<input type="text" placeholder="Username" required>
<input type="password" placeholder="Password" required>

<button type="submit">Register</button>

</form>

<p>Already have account?</p>

<a href="1st.html">Login</a>

</div>

<!-- ✅ SCRIPT ADD KIYA -->
<script>
function redirectLogin(event){
    event.preventDefault(); // page reload rokega
    alert("Registration Successful");
    window.location.href = "1st.html"; // login page pe redirect
}
</script>

</body>
</html>

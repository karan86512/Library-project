<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Library Management System - Login</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url("https://images.unsplash.com/photo-1524995997946-a1c2e315a42f");
            background-size: cover;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-container {
            width: 350px;
            background: white;
            padding: 30px;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.3);
        }

        .logo { width: 70px; margin-bottom: 10px; }
        h1 { font-size: 22px; color: #333; }
        .tagline { color: gray; font-size: 14px; margin-bottom: 20px; }

        input, select {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ddd;
            box-sizing: border-box;
        }

        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px;
            width: 90%;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { background: #2c80b4; }
        .forgot { display: block; font-size: 13px; margin: 5px 0 15px; color: #3498db; text-decoration: none; }
        .register { font-size: 14px; margin-top: 20px; }
        .register a { color: #3498db; text-decoration: none; font-weight: bold; }

        footer { margin-top: 20px; color: white; font-size: 12px; }
    </style>
</head>
<body>

<div class="login-container">
    <img src="https://cdn-icons-png.flaticon.com/512/2232/2232688.png" class="logo" alt="Logo">
    <h1>Library Management</h1>
    <p class="tagline">Knowledge is the key to success</p>

    <select id="role">
        <option value="admin">Admin Login</option>
        <option value="user">Student Login</option>
    </select>

    <input type="text" id="username" placeholder="Enter Username">
    <input type="password" id="password" placeholder="Enter Password">
    
    <a href="#" class="forgot">Forgot Password?</a>
    
    <button onclick="login()">Login</button>

    <p class="register">
        New User? <a href="register.html">Register Here</a>
    </p>
</div>

<footer>
    <p>Developed by Karan More | SPPU Practical 2026</p>
</footer>

<script>
    function login() {
        let role = document.getElementById("role").value;
        let user = document.getElementById("username").value;
        if(user === "") {
            alert("Please enter a username");
            return;
        }
        alert(role.charAt(0).toUpperCase() + role.slice(1) + " Login Successful!");
        // Logic to redirect to dashboard would go here
    }
</script>
</body>
</html>
